name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Keep in sync with requires-python in pyproject.toml (Home Assistant 2026+ target).
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@v6

    # uv installs Python when needed; do not `pip install -e .` — editable installs
    # register custom_components on a setuptools path hook that is not a real directory,
    # which breaks homeassistant.loader's Path(custom_components.__path__).iterdir().
    - uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --extra test --extra dev --no-install-project

    - name: Run pyright
      run: uv run pyright custom_components/storzandbickel

    - name: Run tests
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: uv run pytest --cov=custom_components/storzandbickel --cov-report=xml --cov-report=term

    - name: Upload coverage
      uses: codecov/codecov-action@v6
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
