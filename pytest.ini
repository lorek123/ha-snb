[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=custom_components/storzandbickel
    --cov-report=term-missing
    --cov-fail-under=95
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
